version: '3.8'

services:
  ingestion-worker:
    build: .
    container_name: live-ingestion
    restart: unless-stopped
    ports:
      - "8000:8000" # Opens a port so Prometheus can read the Python metrics
    environment:
      - PYTHONUNBUFFERED=1

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3005:3000" # Mapped to 3005 to avoid your Chromium container
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin # Default password (change later)
